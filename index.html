<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIB Banking - Full Screen</title>
    <style>
        :root {
            --primary-blue: #003a70;
            --light-blue: #007aff;
            --gradient-start: #00b4db;
            --gradient-end: #004a99;
            --text-gray: #666;
            --bg-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 10;
        }

        .lang-switch {
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #333;
            padding: 5px 10px;
        }

        .logo-img {
            height: clamp(30px, 5vw, 50px);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            padding: 40px 0;
        }

        .hero-text {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(to bottom, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 2;
            max-width: 800px;
        }

        .circle-bg {
            position: absolute;
            right: -5%;
            top: 50%;
            transform: translateY(-50%);
            width: clamp(200px, 40vw, 500px);
            height: clamp(200px, 40vw, 500px);
            border: clamp(30px, 5vw, 80px) solid #e1efff;
            border-radius: 50%;
            z-index: 1;
        }

        /* التعديل هنا لتوسيط العناصر في الأسفل */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center; /* توسيط العناصر عرضياً */
            text-align: center;   /* توسيط النص داخلياً */
            gap: 20px;
            padding-bottom: 30px;
            z-index: 10;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px; 
        }

        .btn-main {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 58, 112, 0.2);
        }

        .btn-main:hover {
            background-color: #002a50;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: none;
            border: none;
            color: var(--light-blue);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .legal-text {
            font-size: 0.75rem;
            color: #aaa;
            line-height: 1.6;
            margin-top: 10px;
            max-width: 600px; /* لضمان عدم تمدد النص بشكل طولي جداً */
        }

        @media (min-width: 768px) {
            .button-group {
                flex-direction: row;
                max-width: none;
                justify-content: center; /* توسيط الأزرار بجانب بعضها في الكمبيوتر */
            }
            .btn-main {
                padding: 15px 40px;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <div class="lang-switch" id="langBtn">English</div>
            <img src="https://www.adib.ae/en/SiteAssets/Images/adib-logo.png" alt="ADIB" class="logo-img">
        </header>

        <main>
            <div class="circle-bg"></div>
            <h1 class="hero-text" id="mainTitle">
                خدمات<br>
                مصرفية<br>
                يومية<br>
                بسيطة<br>
                وسهلة
            </h1>
        </main>

        <footer>
            <div class="button-group">
                <button class="btn-main">انضم إلى مصرف أبوظبي الإسلامي</button>
                <button class="btn-secondary">أنا متعامل</button>
            </div>
            <p class="legal-text">
                © 2026 مصرف أبوظبي الإسلامي. جميع الحقوق محفوظة. <br>
                مصرف أبوظبي الإسلامي، شركة مساهمة عامة مرخصة من مصرف الإمارات العربية المتحدة المركزي.
            </p>
        </footer>
    </div>

    <script>
        const langBtn = document.getElementById('langBtn');
        const mainTitle = document.getElementById('mainTitle');

        langBtn.addEventListener('click', () => {
            if (langBtn.innerText === 'English') {
                langBtn.innerText = 'العربية';
                document.documentElement.dir = 'ltr';
                mainTitle.innerHTML = 'Simple<br>Easy<br>Everyday<br>Banking';
            } else {
                langBtn.innerText = 'English';
                document.documentElement.dir = 'rtl';
                mainTitle.innerHTML = 'خدمات<br>مصرفية<br>يومية<br>بسيطة<br>وسهلة';
            }
        });
    </script>
</body>
</html>
